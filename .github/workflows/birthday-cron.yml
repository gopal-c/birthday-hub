name: Birthday Auto-Send

on:
  schedule:
    - cron: '31 18 * * *'
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger birthday cron
        run: |
          curl -X GET "${{ secrets.APP_URL }}/api/cron" \
          -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
